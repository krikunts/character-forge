<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111111">
  <meta name="description" content="Character Forge — офлайн PWA-игра для совместного создания вымышленного персонажа из 20 вопросов.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
  <title>Character Forge</title>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Character Forge</h1>
      </div>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Переключить тему">
        <span class="theme-toggle__label">Тема</span>
        <span id="themeToggleValue">Dark</span>
      </button>
    </header>

    <main id="app" class="layout">
      <section class="panel panel--hero" id="setupScreen">
        <div class="panel__header">
          <h2>20 вопросов. Один персонаж.</h2>
        </div>

        <form id="setupForm" class="setup-form">
          <label class="field">
            <span>Игроки</span>
            <textarea id="playersInput" rows="4" placeholder="Татьяна&#10;Аня&#10;Марина" required></textarea>
            <small>По одному имени на строку.</small>
          </label>

          <fieldset class="mode-picker">
            <legend>Режим партии</legend>
            <label class="mode-card">
              <input type="radio" name="mode" value="standard" checked>
              <span>Стандарт</span>
              <small>20 вопросов</small>
            </label>
            <label class="mode-card">
              <input type="radio" name="mode" value="quick">
              <span>Быстрая</span>
              <small>12 вопросов</small>
            </label>
            <label class="mode-card">
              <input type="radio" name="mode" value="extended">
              <span>Большая</span>
              <small>30 вопросов</small>
            </label>
          </fieldset>

          <div class="setup-actions">
            <button class="button button--primary" type="submit">Начать</button>
            <button class="button" id="restoreButton" type="button" hidden>Продолжить</button>
          </div>
        </form>
      </section>

      <section class="game-view" id="gameScreen" hidden>
        <article class="panel panel--card">
          <div class="progress-block">
            <p class="eyebrow" id="questionCounter">Вопрос 1 из 20</p>
            <div class="progress-bar" aria-hidden="true">
              <span id="progressFill"></span>
            </div>
          </div>

          <div class="turn-chip" id="playerTurn">Отвечает: Татьяна</div>

          <div class="question-card">
            <p class="question-card__category" id="questionCategory">Основа</p>
            <h2 id="questionTitle">Происхождение / раса</h2>
            <p class="question-card__hint" id="questionHint" hidden></p>
          </div>

          <form id="answerForm" class="answer-form">
            <label class="field">
              <textarea id="answerInput" rows="4" placeholder="Ответ" required></textarea>
            </label>

            <div class="answer-actions">
              <button class="button button--primary" type="submit">Сохранить</button>
              <button class="button" id="skipButton" type="button">Пропустить</button>
            </div>
          </form>
        </article>

        <aside class="panel panel--dossier">
          <div class="panel__header panel__header--tight">
            <h2>Досье</h2>
          </div>

          <dl class="dossier-list" id="dossierList"></dl>

          <div class="panel__header panel__header--tight">
            <h3>Действия</h3>
          </div>

          <div class="tool-grid">
            <button class="button" id="saveSnapshotButton" type="button">Сохранить прогресс</button>
            <button class="button" id="restartButton" type="button">Новая партия</button>
          </div>
        </aside>
      </section>

      <section class="panel panel--result" id="resultScreen" hidden>
        <div class="result-head">
          <div>
            <h2 id="resultName">Безымянный герой</h2>
          </div>
          <div class="result-badges">
            <span class="badge" id="resultMode">Стандарт</span>
            <span class="badge" id="resultPlayers">1 игрок</span>
          </div>
        </div>

        <div class="result-grid">
          <article class="result-card">
            <h3>Карточка персонажа</h3>
            <div id="resultCard" class="result-card__body"></div>
          </article>

          <article class="result-card">
            <h3>Краткая биография</h3>
            <p id="resultBio" class="result-bio"></p>
          </article>

          <article class="result-card result-card--full">
            <h3>Полное досье</h3>
            <div id="resultDossier" class="result-dossier"></div>
          </article>
        </div>

        <div class="export-bar">
          <button class="button button--primary" data-export-format="txt" type="button">Экспорт TXT</button>
          <button class="button button--primary" data-export-format="md" type="button">Экспорт Markdown</button>
          <button class="button button--primary" data-export-format="json" type="button">Экспорт JSON</button>
          <button class="button" id="playAgainButton" type="button">Сыграть ещё раз</button>
        </div>
      </section>
    </main>
  </div>

  <template id="dossierItemTemplate">
    <div class="dossier-item">
      <dt></dt>
      <dd></dd>
    </div>
  </template>

  <script src="app.js" type="module"></script>
</body>
</html>
